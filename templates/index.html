<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Django Auth System</title>
    <style>
      .hidden {
        display: none;
      }
      .portal-header {
        background: #f0f0f0;
        padding: 10px;
        margin-bottom: 20px;
        font-weight: bold;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <div id="landing-page">
      <h2>Welcome. Please select your portal:</h2>
      <button onclick="enterPortal('STUDENT')">Login as Student</button>
      <button onclick="enterPortal('TEACHER')">Login as Teacher</button>
    </div>

    <div id="auth-page" class="hidden">
      <div id="portal-banner" class="portal-header"></div>
      <button onclick="backToLanding()">← Change Portal</button>

      <nav style="margin-top: 10px">
        <button id="tab-login" onclick="showAuth('login')">LOGIN</button>
        <button id="tab-register" onclick="showAuth('register')">
          REGISTER
        </button>
      </nav>

      <div class="auth-container">
        <section id="register-section" class="hidden">
          <h3>Create Account</h3>
          <input type="email" id="reg-email" placeholder="Email" /><br />
          <input
            type="password"
            id="reg-password"
            placeholder="Password"
          /><br />
          <button onclick="handleRegister()">Register</button>

          <div id="reg-otp-section" class="hidden">
            <p>Check your email for the OTP</p>
            <input type="text" id="reg-otp" placeholder="Enter OTP" /><br />
            <button onclick="handleVerifyRegistration()">
              Verify & Activate
            </button>
          </div>
        </section>

        <section id="login-section">
          <h3>Login</h3>
          <input type="email" id="login-email" placeholder="Email" /><br />
          <input
            type="password"
            id="login-password"
            placeholder="Password"
          /><br />
          <button onclick="handleLogin()">Login</button><br />
          <a href="#" onclick="toggleModal(true)">Forgot Password?</a>
        </section>

        <hr />
        <button onclick="handleGoogleLogin()">Sign in with Google</button>
      </div>
    </div>

    <div
      id="fp-modal"
      class="hidden"
      style="border: 1px solid black; padding: 20px; margin-top: 20px"
    >
      <h3>Reset Password</h3>
      <div id="fp-step-1">
        <input
          type="email"
          id="fp-email"
          placeholder="Enter your email"
        /><br />
        <button onclick="handleForgotPassword()">Send Reset OTP</button>
      </div>
      <div id="fp-step-2" class="hidden">
        <input type="text" id="fp-otp" placeholder="Enter OTP" /><br />
        <input
          type="password"
          id="fp-new-password"
          placeholder="New Password"
        /><br />
        <button onclick="handleResetPassword()">Change Password</button>
      </div>
      <button onclick="toggleModal(false)">Close</button>
    </div>

    <script>
      const API_BASE = "/api/auth";
      let currentPortal = ""; // State: 'STUDENT' or 'TEACHER'

      // Portal Entry Logic
      function enterPortal(role) {
        currentPortal = role;
        document.getElementById("landing-page").classList.add("hidden");
        document.getElementById("auth-page").classList.remove("hidden");
        document.getElementById("portal-banner").innerText = role + " PORTAL";
        showAuth("login");
      }

      function backToLanding() {
        document.getElementById("landing-page").classList.remove("hidden");
        document.getElementById("auth-page").classList.add("hidden");
      }

      // UI Toggles
      function showAuth(type) {
        document
          .getElementById("login-section")
          .classList.toggle("hidden", type !== "login");
        document
          .getElementById("register-section")
          .classList.toggle("hidden", type !== "register");
      }

      function toggleModal(show) {
        document.getElementById("fp-modal").classList.toggle("hidden", !show);
      }

      // Logic: Register (Passes currentPortal as role)
      async function handleRegister() {
        const email = document.getElementById("reg-email").value;
        const password = document.getElementById("reg-password").value;

        const res = await fetch(`${API_BASE}/register/`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email, password, role: currentPortal }),
        });

        if (res.ok) {
          alert("OTP Sent!");
          document.getElementById("reg-otp-section").classList.remove("hidden");
        } else {
          const data = await res.json();
          alert("Error: " + JSON.stringify(data));
        }
      }

      // Logic: Verify
      async function handleVerifyRegistration() {
        const email = document.getElementById("reg-email").value;
        const otp = document.getElementById("reg-otp").value;
        const res = await fetch(`${API_BASE}/verify-otp/`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email, otp }),
        });
        if (res.ok) {
          alert("Verified!");
          showAuth("login");
        } else {
          alert("Invalid OTP");
        }
      }

      // Logic: Login
      async function handleLogin() {
        const email = document.getElementById("login-email").value;
        const password = document.getElementById("login-password").value;

        const res = await fetch(`${API_BASE}/login/`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email, password, role: currentPortal }),
        });

        const data = await res.json();
        if (res.ok) {
          localStorage.setItem("token", data.access);
          localStorage.setItem("user", JSON.stringify(data.user));
          window.location.href = "/dashboard/";
        } else {
          alert(data.error || "Login Failed");
        }
      }

      async function handleForgotPassword() {
        const email = document.getElementById("fp-email").value;
        const res = await fetch(`${API_BASE}/password-reset/`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email }),
        });
        if (res.ok) {
          document.getElementById("fp-step-1").classList.add("hidden");
          document.getElementById("fp-step-2").classList.remove("hidden");
        }
      }

      async function handleResetPassword() {
        const email = document.getElementById("fp-email").value;
        const otp = document.getElementById("fp-otp").value;
        const password = document.getElementById("fp-new-password").value;
        const res = await fetch(`${API_BASE}/reset-password/`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email, otp, password }),
        });
        if (res.ok) {
          alert("Success!");
          toggleModal(false);
          showAuth("login");
        }
      }

      // Google Redirect with Role
      function handleGoogleLogin() {
        window.location.href = `${API_BASE}/google/?role=${currentPortal}`;
      }
    </script>
  </body>
</html>
